name: Build and Release DEEIX-Chat

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要切换的分支、标签或 Commit SHA'
        required: true
        default: 'main'
      linux:
        description: '编译 Linux 平台 (包含 amd64, arm64)'
        type: boolean
        default: true
      windows:
        description: '编译 Windows 平台 (包含 amd64)'
        type: boolean
        default: true
      mac:
        description: '编译 macOS 平台 (包含 Intel amd64, Apple Silicon arm64)'
        type: boolean
        default: true
      create_release:
        description: '编译完成后是否自动创建 GitHub Release'
        type: boolean
        default: false
      next_public_api_base_url:
        description: '前端构建时的 NEXT_PUBLIC_API_BASE_URL（可留空）'
        required: false
        default: ''

env:
  TARGET_REPO: 'DEEIX-AI/DEEIX-Chat'
  GO_PACKAGE: 'github.com/DEEIX-AI/DEEIX-Chat/backend/internal/shared/buildinfo'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          MATRIX_JSON="[]"

          append_to_matrix() {
            local os=$1
            local arch=$2
            local runner=$3
            local suffix=$4
            local cc=$5
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq \
              --arg os "$os" \
              --arg arch "$arch" \
              --arg runner "$runner" \
              --arg suffix "$suffix" \
              --arg cc "$cc" \
              '. += [{"goos": $os, "goarch": $arch, "runner": $runner, "suffix": $suffix, "cc": $cc}]')
          }

          if [ "${{ inputs.linux }}" = "true" ]; then
            append_to_matrix "linux" "amd64" "ubuntu-latest" "" "gcc"
            append_to_matrix "linux" "arm64" "ubuntu-latest" "" "aarch64-linux-gnu-gcc"
          fi

          if [ "${{ inputs.windows }}" = "true" ]; then
            append_to_matrix "windows" "amd64" "ubuntu-latest" ".exe" "x86_64-w64-mingw32-gcc"
          fi

          if [ "${{ inputs.mac }}" = "true" ]; then
            # macOS 需要本机 SDK / 系统库，使用 macOS runner
            append_to_matrix "darwin" "amd64" "macos-15" "" "clang"
            append_to_matrix "darwin" "arm64" "macos-15" "" "clang"
          fi

          if [ "$(echo "$MATRIX_JSON" | jq 'length')" -eq 0 ]; then
            echo "错误：未选择任何平台！请至少选择一个编译平台。" >&2
            exit 1
          fi

          echo "matrix=$(echo "$MATRIX_JSON" | jq -c .)" >> "$GITHUB_OUTPUT"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline --filter @deeix/web

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.next_public_api_base_url }}
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          cd frontend
          pnpm build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1
          if-no-files-found: error

  build-backend:
    needs: [setup-matrix, build-frontend]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install Linux/Windows build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libsqlite3-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            zip

          # 为 linux/arm64 交叉编译准备 SQLite 头文件/库
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              libsqlite3-dev:arm64 \
              || true
          fi

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew list sqlite >/dev/null 2>&1 || brew install sqlite
          brew list pkg-config >/dev/null 2>&1 || brew install pkg-config

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: temp-frontend-out

      - name: Read version metadata
        id: meta
        shell: bash
        run: |
          if [ -f VERSION ]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
          else
            VERSION="${{ inputs.branch }}"
          fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Build Go Backend
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail
          cd backend

          # macOS 下优先使用 Homebrew SQLite
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export PKG_CONFIG_PATH="$(brew --prefix sqlite)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            export CGO_CFLAGS="-I$(brew --prefix sqlite)/include ${CGO_CFLAGS:-}"
            export CGO_LDFLAGS="-L$(brew --prefix sqlite)/lib ${CGO_LDFLAGS:-}"
          fi

          # Windows 交叉编译时关闭 auto-import 相关噪音
          if [ "${{ matrix.goos }}" = "windows" ]; then
            export CGO_LDFLAGS="-static-libgcc -static-libstdc++ ${CGO_LDFLAGS:-}"
          fi

          # linux/arm64 交叉编译
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
            export CGO_CFLAGS="-I/usr/include ${CGO_CFLAGS:-}"
            export CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu ${CGO_LDFLAGS:-}"
          fi

          go build -trimpath \
            -ldflags="-s -w \
              -X ${{ env.GO_PACKAGE }}.Version=${{ steps.meta.outputs.version }} \
              -X ${{ env.GO_PACKAGE }}.Commit=${{ steps.meta.outputs.git_commit }} \
              -X ${{ env.GO_PACKAGE }}.BuildTime=${{ steps.meta.outputs.build_time }}" \
            -o "../deeix-chat${{ matrix.suffix }}" \
            ./cmd/server

      - name: Package Release Archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-pkg/frontend
          mkdir -p release-pkg/licenses/DEEIX-Chat
          mkdir -p release-pkg/storage release-pkg/data

          mv temp-frontend-out release-pkg/frontend/out
          mv "deeix-chat${{ matrix.suffix }}" release-pkg/

          # 与 Dockerfile runtime 阶段保持一致
          if [ -f LICENSE ]; then
            cp LICENSE release-pkg/licenses/DEEIX-Chat/
          fi
          if [ -f NOTICE ]; then
            cp NOTICE release-pkg/licenses/DEEIX-Chat/
          fi
          if [ -f VERSION ]; then
            cp VERSION release-pkg/VERSION
          fi
          if [ -f config.example.yaml ]; then
            cp config.example.yaml release-pkg/config.example.yaml
          elif [ -f backend/config.example.yaml ]; then
            cp backend/config.example.yaml release-pkg/config.example.yaml
          fi

          # 运行说明（方便用户直接启动）
          cat > release-pkg/README-RELEASE.txt <<EOF
          DEEIX-Chat Release Package
          Platform: ${{ matrix.goos }}/${{ matrix.goarch }}
          Version: ${{ steps.meta.outputs.version }}
          Commit: ${{ steps.meta.outputs.git_commit }}
          BuildTime: ${{ steps.meta.outputs.build_time }}

          启动前请确保：
          1. 可执行文件与 frontend/out 在同一包内
          2. 默认监听 8080
          3. 数据目录建议挂载/使用 ./storage 与 ./data

          环境变量：
          FRONTEND_DIST_DIR=./frontend/out
          EOF

          cd release-pkg
          ARCHIVE_BASE="deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "../${ARCHIVE_BASE}.zip" .
          else
            tar -czf "../${ARCHIVE_BASE}.tar.gz" .
          fi

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            deeix-chat-*.zip
            deeix-chat-*.tar.gz
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: [setup-matrix, build-backend]
    if: ${{ inputs.create_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: |
          if [ -f VERSION ]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
          else
            VERSION="${{ inputs.branch }}"
          fi

          # tag 做简单清洗，避免非法字符
          SAFE_TAG="$(echo "deeix-chat-${VERSION}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p release-files
          find all-artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-files/ \;
          ls -lah release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: "DEEIX-Chat ${{ steps.release-meta.outputs.version }}"
          body: |
            ## DEEIX-Chat ${{ steps.release-meta.outputs.version }}

            构建来源：`${{ inputs.branch }}`

            ### 包内容
            - `deeix-chat` 可执行文件
            - `frontend/out` 前端静态资源
            - `licenses/DEEIX-Chat` 许可证文件
            - `storage/` / `data/` 数据目录占位

            ### 运行示例
            ```bash
            export FRONTEND_DIST_DIR=./frontend/out
            ./deeix-chat
            ```
            默认端口：`8080`
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}