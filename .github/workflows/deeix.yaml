name: Build and Release DEEIX-Chat

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要切换的分支、标签或 Commit SHA'
        required: true
        default: 'main'
      linux:
        description: '编译 Linux 平台 (包含 amd64, arm64)'
        type: boolean
        default: true
      windows:
        description: '编译 Windows 平台 (包含 amd64)'
        type: boolean
        default: true
      mac:
        description: '编译 macOS 平台 (包含 Intel amd64, Apple Silicon arm64)'
        type: boolean
        default: true
      android:
        description: '编译 Android 平台 (仅支持 arm64)'
        type: boolean
        default: false
      android_api:
        description: 'Android 最低 API level（仅 android 构建使用）'
        required: true
        type: string
        default: '24'
      ndk_version:
        description: 'NDK 版本名（对应 android-ndk-<name>-linux.zip，如 r27d）'
        required: true
        type: string
        default: 'r27d'
      create_release:
        description: '编译完成后是否自动创建 GitHub Release'
        type: boolean
        default: false
      next_public_api_base_url:
        description: '前端构建时的 NEXT_PUBLIC_API_BASE_URL（可留空）'
        required: false
        default: ''

env:
  TARGET_REPO: 'DEEIX-AI/DEEIX-Chat'
  GO_PACKAGE: 'github.com/DEEIX-AI/DEEIX-Chat/backend/internal/shared/buildinfo'
  ANDROID_API_LEVEL: ${{ inputs.android_api }}
  NDK_VERSION: ${{ inputs.ndk_version }}
  SQLITE_YEAR: '2025'
  SQLITE_AMALGAMATION: 'sqlite-amalgamation-3490100'

permissions:
  contents: write

concurrency:
  group: build-deeix-chat-${{ github.ref }}-${{ inputs.branch }}-${{ inputs.linux }}-${{ inputs.windows }}-${{ inputs.mac }}-${{ inputs.android }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          if [ "${{ inputs.android }}" = "true" ]; then
            API="${{ inputs.android_api }}"
            NDK_VERSION="${{ inputs.ndk_version }}"

            if [[ ! "$API" =~ ^[0-9]+$ ]] || (( API < 21 || API > 35 )); then
              echo "::error::android_api must be an integer 21–35 (got: $API)"
              exit 1
            fi
            if [[ ! "$NDK_VERSION" =~ ^r[0-9]+[a-z]?$ ]]; then
              echo "::error::ndk_version must look like r27d (got: $NDK_VERSION)"
              exit 1
            fi
          fi

      - name: Generate matrix
        id: set-matrix
        run: |
          set -euo pipefail
          MATRIX_JSON="[]"

          append_to_matrix() {
            local os=$1
            local arch=$2
            local runner=$3
            local suffix=$4
            local cc=$5
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq \
              --arg os "$os" \
              --arg arch "$arch" \
              --arg runner "$runner" \
              --arg suffix "$suffix" \
              --arg cc "$cc" \
              '. += [{"goos": $os, "goarch": $arch, "runner": $runner, "suffix": $suffix, "cc": $cc}]')
          }

          if [ "${{ inputs.linux }}" = "true" ]; then
            append_to_matrix "linux" "amd64" "ubuntu-latest" "" "gcc"
            append_to_matrix "linux" "arm64" "ubuntu-24.04-arm" "" "gcc"
          fi

          if [ "${{ inputs.windows }}" = "true" ]; then
            append_to_matrix "windows" "amd64" "windows-latest" ".exe" "gcc"
          fi

          if [ "${{ inputs.mac }}" = "true" ]; then
            append_to_matrix "darwin" "amd64" "macos-15" "" "clang"
            append_to_matrix "darwin" "arm64" "macos-15" "" "clang"
          fi

          if [ "${{ inputs.android }}" = "true" ]; then
            append_to_matrix "android" "arm64" "ubuntu-latest" "" "ndk"
          fi

          if [ "$(echo "$MATRIX_JSON" | jq 'length')" -eq 0 ]; then
            echo "错误：未选择任何平台！请至少选择一个编译平台。" >&2
            exit 1
          fi

          echo "matrix=$(echo "$MATRIX_JSON" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Selected matrix: $MATRIX_JSON"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline --filter @deeix/web

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.next_public_api_base_url }}
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          cd frontend
          pnpm build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1
          if-no-files-found: error

  build-backend:
    needs: [setup-matrix, build-frontend]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Export Go env (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "GOROOT=$(go env GOROOT)" >> "$GITHUB_ENV"
          echo "GOPATH=$(go env GOPATH)" >> "$GITHUB_ENV"
          echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
          echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
          go version
          go env GOROOT GOPATH GOCACHE

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            pkg-config \
            libsqlite3-dev \
            zip \
            file
          pkg-config --exists sqlite3
          echo "sqlite3 ok: $(pkg-config --modversion sqlite3)"

      - name: Setup MSYS2 (Windows)
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 不继承脏 PATH（Strawberry / 系统 mingw）
          path-type: minimal
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-sqlite3
            zip
            tar

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew list sqlite >/dev/null 2>&1 || brew install sqlite
          brew list pkg-config >/dev/null 2>&1 || brew install pkg-config

      - name: Install host tools (Android)
        if: matrix.goos == 'android'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip ca-certificates file

      - name: Cache Android NDK
        if: matrix.goos == 'android'
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ndk/android-ndk-${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64

      - name: Download & extract Android NDK
        if: matrix.goos == 'android' && steps.cache-ndk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          NDK_VERSION="${{ env.NDK_VERSION }}"
          NDK="${{ github.workspace }}/.ndk/android-ndk-${NDK_VERSION}"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          url="https://dl.google.com/android/repository/${zip}"

          mkdir -p "$(dirname "$NDK")"
          echo "Downloading $url"
          wget -q --show-progress -O "/tmp/${zip}" "$url"
          echo "Extracting..."
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"

          test -x "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          cat "$NDK/source.properties"

      - name: Verify Android NDK
        if: matrix.goos == 'android'
        shell: bash
        run: |
          set -euo pipefail

          NDK="${{ github.workspace }}/.ndk/android-ndk-${{ env.NDK_VERSION }}"
          API="${{ env.ANDROID_API_LEVEL }}"
          PREBUILT="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          CLANG="$PREBUILT/bin/aarch64-linux-android${API}-clang"

          echo "NDK=$NDK"
          echo "API=$API"
          test -d "$NDK"
          "$PREBUILT/bin/clang" --version | head -2
          ls "$PREBUILT/bin" | grep -E "aarch64-linux-android${API}-clang$" | head -3
          test -x "$CLANG"
          echo "CC=$CLANG"

          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK" >> "$GITHUB_ENV"

      - name: Prepare SQLite amalgamation
        if: matrix.goos == 'android' || matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail

          SQLITE_DIR="${{ github.workspace }}/.deps/${{ env.SQLITE_AMALGAMATION }}"
          ZIP_NAME="${{ env.SQLITE_AMALGAMATION }}.zip"
          URL="https://www.sqlite.org/${{ env.SQLITE_YEAR }}/${ZIP_NAME}"

          mkdir -p "${{ github.workspace }}/.deps"
          if [ ! -f "$SQLITE_DIR/sqlite3.h" ]; then
            echo "Downloading $URL"
            if command -v wget >/dev/null 2>&1; then
              wget -q -O "/tmp/${ZIP_NAME}" "$URL"
            else
              curl -fsSL -o "/tmp/${ZIP_NAME}" "$URL"
            fi
            unzip -q "/tmp/${ZIP_NAME}" -d "${{ github.workspace }}/.deps"
            rm -f "/tmp/${ZIP_NAME}"
          fi

          test -f "$SQLITE_DIR/sqlite3.h"
          echo "SQLITE_SRC=${SQLITE_DIR}" >> "$GITHUB_ENV"
          echo "SQLite amalgamation ready: ${SQLITE_DIR}"

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: temp-frontend-out

      - name: Read version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ -f VERSION ]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
          else
            VERSION="${{ inputs.branch }}"
          fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION} commit=${GIT_COMMIT} time=${BUILD_TIME}"

      - name: Build Go Backend (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          set -euo pipefail
          cd backend

          if [ "${{ matrix.goos }}" = "android" ]; then
            NDK="${ANDROID_NDK_HOME:-${{ github.workspace }}/.ndk/android-ndk-${{ env.NDK_VERSION }}}"
            API="${{ env.ANDROID_API_LEVEL }}"
            PREBUILT="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
            export CC="$PREBUILT/bin/aarch64-linux-android${API}-clang"
            export CXX="$PREBUILT/bin/aarch64-linux-android${API}-clang++"
            test -x "$CC"

            export CGO_CFLAGS="-fPIC -I${SQLITE_SRC}"
            export CGO_LDFLAGS="-fPIC"

          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            export CC="${{ matrix.cc }}"
            export PKG_CONFIG_PATH="$(brew --prefix sqlite)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            export CGO_CFLAGS="-I$(brew --prefix sqlite)/include ${CGO_CFLAGS:-}"
            export CGO_LDFLAGS="-L$(brew --prefix sqlite)/lib ${CGO_LDFLAGS:-}"

          else
            export CC="${{ matrix.cc }}"
          fi

          echo "Building with GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=$CGO_ENABLED CC=${CC:-default}"
          echo "CGO_CFLAGS=${CGO_CFLAGS:-}"
          echo "CGO_LDFLAGS=${CGO_LDFLAGS:-}"

          go build -trimpath \
            -ldflags="-s -w \
              -X ${{ env.GO_PACKAGE }}.Version=${{ steps.meta.outputs.version }} \
              -X ${{ env.GO_PACKAGE }}.Commit=${{ steps.meta.outputs.git_commit }} \
              -X ${{ env.GO_PACKAGE }}.BuildTime=${{ steps.meta.outputs.build_time }}" \
            -o "../deeix-chat${{ matrix.suffix }}" \
            ./cmd/server

          file "../deeix-chat${{ matrix.suffix }}" || true
          ls -lah "../deeix-chat${{ matrix.suffix }}"

      # Windows：全程在 MSYS2 内构建，避免 Git Bash 路径导致 cgo exit 2
      - name: Build Go Backend (Windows / MSYS2)
        if: matrix.goos == 'windows'
        shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
        run: |
          set -euo pipefail

          # 1) 工具链：只用 MSYS2 mingw64
          export PATH="/mingw64/bin:/usr/bin"
          export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
          export CC=gcc
          export CXX=g++
          export PKG_CONFIG=pkg-config

          # 2) 注入 setup-go 的 Go（Windows 路径 -> MSYS 路径）
          if [ -z "${GOROOT:-}" ]; then
            echo "::error::GOROOT is empty"
            exit 1
          fi
          export GOROOT="$(cygpath -u "${GOROOT}")"
          export PATH="${GOROOT}/bin:${PATH}"

          if [ -n "${GOPATH:-}" ]; then
            export GOPATH="$(cygpath -u "${GOPATH}")"
          fi
          if [ -n "${GOCACHE:-}" ]; then
            export GOCACHE="$(cygpath -u "${GOCACHE}")"
          fi
          if [ -n "${GOMODCACHE:-}" ]; then
            export GOMODCACHE="$(cygpath -u "${GOMODCACHE}")"
          fi

          # workspace 也转成 MSYS 路径
          WORKDIR="$(cygpath -u "${{ github.workspace }}")"
          cd "${WORKDIR}"

          echo "== toolchain =="
          command -v go
          command -v gcc
          command -v pkg-config
          go version
          gcc --version | head -2
          pkg-config --version || true
          pkg-config --exists sqlite3
          echo "sqlite3: $(pkg-config --modversion sqlite3)"
          echo "sqlite cflags: $(pkg-config --cflags sqlite3)"
          echo "sqlite libs: $(pkg-config --libs sqlite3)"
          go env CC CXX CGO_ENABLED GOROOT GOOS GOARCH

          # 3) sqlite 头文件（amalgamation 兜底）
          SQLITE_INC=""
          if [ -n "${SQLITE_SRC:-}" ]; then
            SQLITE_SRC_U="$(cygpath -u "${SQLITE_SRC}")"
            SQLITE_INC="-I${SQLITE_SRC_U}"
            echo "SQLITE_SRC=${SQLITE_SRC_U}"
            test -f "${SQLITE_SRC_U}/sqlite3.h"
          fi

          export CGO_CFLAGS="$(pkg-config --cflags sqlite3) ${SQLITE_INC}"
          export CGO_LDFLAGS="$(pkg-config --libs sqlite3)"
          echo "CGO_CFLAGS=${CGO_CFLAGS}"
          echo "CGO_LDFLAGS=${CGO_LDFLAGS}"

          # 4) 先做一个最小 CGO 探测，失败时打出真实 gcc 错误
          cat > /tmp/cgo_probe.go <<'EOF'
          package main

          /*
          #include <sqlite3.h>
          #include <stdio.h>
          static void probe(void) {
            printf("sqlite=%s\n", sqlite3_libversion());
          }
          */
          import "C"

          func main() {
            C.probe()
          }
          EOF

          echo "== cgo probe =="
          if ! go run /tmp/cgo_probe.go; then
            echo "::error::CGO probe failed; dumping verbose compile"
            go build -x -work -o /tmp/cgo_probe.exe /tmp/cgo_probe.go || true
            exit 1
          fi

          # 5) 正式构建
          cd "${WORKDIR}/backend"
          echo "== build deeix-chat =="
          go build -trimpath \
            -ldflags="-s -w \
              -X ${{ env.GO_PACKAGE }}.Version=${{ steps.meta.outputs.version }} \
              -X ${{ env.GO_PACKAGE }}.Commit=${{ steps.meta.outputs.git_commit }} \
              -X ${{ env.GO_PACKAGE }}.BuildTime=${{ steps.meta.outputs.build_time }}" \
            -o "${WORKDIR}/deeix-chat.exe" \
            ./cmd/server

          ls -lah "${WORKDIR}/deeix-chat.exe"

      - name: Package Release Archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-pkg/frontend
          mkdir -p release-pkg/licenses/DEEIX-Chat
          mkdir -p release-pkg/storage release-pkg/data

          mv temp-frontend-out release-pkg/frontend/out
          mv "deeix-chat${{ matrix.suffix }}" release-pkg/

          if [ -f LICENSE ]; then
            cp LICENSE release-pkg/licenses/DEEIX-Chat/
          fi
          if [ -f NOTICE ]; then
            cp NOTICE release-pkg/licenses/DEEIX-Chat/
          fi
          if [ -f VERSION ]; then
            cp VERSION release-pkg/VERSION
          fi
          if [ -f config.example.yaml ]; then
            cp config.example.yaml release-pkg/config.example.yaml
            cp config.full.example.yaml release-pkg/config.full.example.yaml
            cp config.sqlite.example.yaml release-pkg/config.sqlite.example.yaml
          fi

          cat > release-pkg/README-RELEASE.txt <<EOF
          DEEIX-Chat Release Package
          Platform: ${{ matrix.goos }}/${{ matrix.goarch }}
          Version: ${{ steps.meta.outputs.version }}
          Commit: ${{ steps.meta.outputs.git_commit }}
          BuildTime: ${{ steps.meta.outputs.build_time }}

          启动前请确保：
          1. 可执行文件与 frontend/out 在同一包内
          2. 默认监听 8080
          3. 数据目录建议使用 ./storage 与 ./data

          环境变量：
          FRONTEND_DIST_DIR=./frontend/out

          运行示例：
          export FRONTEND_DIST_DIR=./frontend/out
          ./deeix-chat${{ matrix.suffix }}

          Android 说明：
          - 产物为 arm64 可执行文件，需在 Android 终端环境（如 Termux）中运行
          - 不是 APK
          - min API: ${{ env.ANDROID_API_LEVEL }}
          - NDK: ${{ env.NDK_VERSION }}
          EOF

          cd release-pkg
          ARCHIVE_BASE="deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            if command -v zip >/dev/null 2>&1; then
              zip -r "../${ARCHIVE_BASE}.zip" .
            else
              powershell.exe -NoProfile -Command "Compress-Archive -Path * -DestinationPath '../${ARCHIVE_BASE}.zip' -Force"
            fi
          else
            tar -czf "../${ARCHIVE_BASE}.tar.gz" .
          fi

          ls -lah ../deeix-chat-* || true

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            deeix-chat-*.zip
            deeix-chat-*.tar.gz
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: [setup-matrix, build-backend]
    if: ${{ inputs.create_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          if [ -f VERSION ]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
          else
            VERSION="${{ inputs.branch }}"
          fi

          SAFE_TAG="$(echo "deeix-chat-${VERSION}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${SAFE_TAG} version=${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten directory structure
        run: |
          set -euo pipefail
          mkdir -p release-files
          find all-artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-files/ \;
          ls -lah release-files
          test "$(find release-files -type f | wc -l)" -gt 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: "DEEIX-Chat ${{ steps.release-meta.outputs.version }}"
          body: |
            ## DEEIX-Chat ${{ steps.release-meta.outputs.version }}

            构建来源：`${{ inputs.branch }}`

            ### 包内容
            - `deeix-chat` 可执行文件
            - `frontend/out` 前端静态资源
            - `licenses/DEEIX-Chat` 许可证文件
            - `storage/` / `data/` 数据目录占位

            ### 支持平台
            - Linux amd64 / arm64
            - Windows amd64
            - macOS amd64 / arm64
            - Android arm64（二进制，非 APK；min API `${{ inputs.android_api }}`，NDK `${{ inputs.ndk_version }}`）

            ### 运行示例
            ```bash
            export FRONTEND_DIST_DIR=./frontend/out
            ./deeix-chat
            ```
            默认端口：`8080`
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}