name: Build and Release DEEIX-Chat

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要切换的分支、标签或 Commit SHA'
        required: true
        default: 'main'
      linux:
        description: '编译 Linux 平台 (包含 amd64, arm64)'
        type: boolean
        default: true
      windows:
        description: '编译 Windows 平台 (包含 amd64)'
        type: boolean
        default: true
      mac:
        description: '编译 macOS 平台 (包含 Intel amd64, Apple M系列 arm64)'
        type: boolean
        default: true
      android:
        description: '编译 Android 平台 (仅支持 arm64 实体手机架构)'
        type: boolean
        default: false
      next_public_api_base_url:
        description: 'Next.js 编译时内置的 API 基础 URL (NEXT_PUBLIC_API_BASE_URL)'
        required: false
        default: 'http://127.0.0.1:8080'
      create_release:
        description: '编译完成后是否自动创建 GitHub Release'
        type: boolean
        default: false

env:
  TARGET_REPO: 'DEEIX-AI/DEEIX-Chat'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          MATRIX_JSON="[]"
          
          append_to_matrix() {
            local os=$1
            local arch=$2
            local suffix=$3
            local runner=$4
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq --arg os "$os" --arg arch "$arch" --arg suffix "$suffix" --arg runner "$runner" '. += [{"goos": $os, "goarch": $arch, "suffix": $suffix, "runner": $runner}]')
          }
          
          if [ "${{ inputs.linux }}" = "true" ]; then
            append_to_matrix "linux" "amd64" "" "ubuntu-latest"
            append_to_matrix "linux" "arm64" "" "ubuntu-latest-arm64"
          fi
          
          if [ "${{ inputs.windows }}" = "true" ]; then
            append_to_matrix "windows" "amd64" ".exe" "windows-latest"
          fi
          
          if [ "${{ inputs.mac }}" = "true" ]; then
            append_to_matrix "darwin" "amd64" "" "macos-latest"
            append_to_matrix "darwin" "arm64" "" "macos-latest"
          fi

          if [ "${{ inputs.android }}" = "true" ]; then
            # Android CGO 编译依赖 NDK，在 Linux Runner 上通过工具链进行交叉编译
            append_to_matrix "android" "arm64" "" "ubuntu-latest"
          fi
          
          if [ "$(echo "$MATRIX_JSON" | jq 'length')" -eq 0 ]; then
            echo "错误：未选择任何平台！请至少选择一个编译平台。" >&2
            exit 1
          fi
          
          echo "matrix=$(echo "$MATRIX_JSON" | jq -c .)" >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline --filter @deeix/web

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.next_public_api_base_url }}
        run: |
          cd frontend
          pnpm build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v7
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1

  build-backend:
    needs: [setup-matrix, build-frontend]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install SQLite Dev Libraries (Linux Only)
        if: runner.os == 'Linux' && matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Set up NDK (Android Only)
        if: matrix.goos == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b

      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: frontend-out
          path: temp-out

      - name: Build Go Backend
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          cd backend
          VERSION=$(cat ../VERSION)
          GIT_COMMIT=${{ github.sha }}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # 针对 Android CGO 编译，特殊配置 CC 指向 NDK 的 cross-clang 编译器
          if [ "${{ matrix.goos }}" = "android" ]; then
            export CC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          fi
          
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/DEEIX-AI/DEEIX-Chat/backend/internal/shared/buildinfo.Version=${VERSION} \
              -X github.com/DEEIX-AI/DEEIX-Chat/backend/internal/shared/buildinfo.Commit=${GIT_COMMIT} \
              -X github.com/DEEIX-AI/DEEIX-Chat/backend/internal/shared/buildinfo.BuildTime=${BUILD_TIME}" \
            -o ../deeix-chat${{ matrix.suffix }} ./cmd/server

      - name: Package Release Archive
        shell: bash
        run: |
          mkdir -p release-pkg/frontend
          mv temp-out release-pkg/frontend/out
          mv deeix-chat${{ matrix.suffix }} release-pkg/
          
          # 复制 License 授权和通告信息文件
          mkdir -p release-pkg/licenses/DEEIX-Chat
          if [ -f LICENSE ]; then cp LICENSE release-pkg/licenses/DEEIX-Chat/; fi
          if [ -f NOTICE ]; then cp NOTICE release-pkg/licenses/DEEIX-Chat/; fi
          
          # 复制常用基础配置文件和版本标识
          if [ -f config.example.yaml ]; then cp config.example.yaml release-pkg/; fi
          if [ -f VERSION ]; then cp VERSION release-pkg/; fi
          
          cd release-pkg
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ../deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}.zip *
          else
            tar -czf ../deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz *
          fi

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v7
        with:
          name: deeix-chat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            deeix-chat-*.zip
            deeix-chat-*.tar.gz
          retention-days: 7

  create-release:
    needs: [setup-matrix, build-backend]
    if: ${{ inputs.create_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ inputs.branch }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p release-files
          find all-artifacts -name "*.zip" -exec cp {} release-files/ \;
          find all-artifacts -name "*.tar.gz" -exec cp {} release-files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
          tag_name: "deeix-chat-${{ inputs.branch }}"
          name: "DEEIX-Chat - ${{ inputs.branch }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}